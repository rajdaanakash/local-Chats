<!DOCTYPE html>
<html>
<head>
    <title>Local Chats</title>
    <style>
    /* 📱 Mobile-First Responsive Design */
    body { 
        background: #080808; 
        color: #00ff41; 
        font-family: 'Courier New', monospace; 
        margin: 0; 
        display: flex; 
        flex-direction: column; 
        height: 100vh; 
    }

    #chat-container { 
        flex-grow: 1;
        border: 1px solid #1a1a1a; 
        overflow-y: auto; 
        padding: 15px; 
        background: rgba(0, 255, 65, 0.02);
    }

    /* Input Area Styling */
    .input-area { 
        display: flex; 
        padding: 15px; 
        background: #111; 
        border-top: 2px solid #00ff41; 
    }

    input { 
        flex-grow: 1; 
        background: #000; 
        color: #00ff41; 
        border: 1px solid #333; 
        padding: 12px; 
        font-size: 16px; /* Prevents iOS auto-zoom */
        outline: none; 
    }

    button { 
        background: #00ff41; 
        color: #000; 
        border: none; 
        padding: 0 20px; 
        margin-left: 10px; 
        font-weight: bold; 
        cursor: pointer; 
        text-transform: uppercase;
    }

    #login-screen { 
        padding: 40px; 
        text-align: center; 
        margin: auto; 
    }

    /* User Styles */
    .user-name { color: #fff; font-weight: bold; margin-right: 8px; }
    .system-msg { color: #555; font-size: 0.9em; margin: 10px 0; }
</style>

<body>
    <div id="login-screen">
        <h2>[ ACCESS REQUIRED ]</h2>
        <input type="text" id="username-input" placeholder="IDENTIFY USERNAME...">
        <button onclick="handleLogin()">ENTER</button>
    </div>

    <div id="main-chat" style="display:none; height: 100%;">
        <div id="chat-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="MESSAGE..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        function handleLogin() {
            const input = document.getElementById('username-input');
            myUsername = input.value.trim();
            if(myUsername) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-chat').style.display = 'flex';
                socket.emit('join', myUsername);
            }
        }

        function checkEnter(e) { if (e.key === 'Enter') sendMessage(); }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const msg = input.value.trim();
            if(msg) {
                socket.emit('chatMessage', msg);
                input.value = "";
            }
        }

        socket.on('message', (data) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.style.marginBottom = "8px";
            
            if(data.user === 'SYSTEM') {
                div.innerHTML = `<span class="system-msg">>> ${data.text}</span>`;
            } else {
                div.innerHTML = `<span class="user-name">${data.user}:</span> ${data.text}`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body>
</html>
