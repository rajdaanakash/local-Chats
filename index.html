<!DOCTYPE html>
<html>
<head>
    <title>Local | Chats</title>
    <style>
        body { background: #0d0d0d; color: #00ff41; font-family: 'Courier New', monospace; margin: 20px; }
        #chat-container { border: 1px solid #00ff41; height: 70vh; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        #login-screen { text-align: center; margin-top: 100px; }
        #main-chat { display: none; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; width: 80%; outline: none; }
        .system-msg { color: #888; font-style: italic; }
        .user-name { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>[ SYSTEM INITIALIZING ]</h2>
        <input type="text" id="username-input" placeholder="ENTER USERNAME..." onkeypress="handleLogin(event)">
    </div>

    <div id="main-chat">
        <div id="chat-container"></div>
        <input type="text" id="message-input" placeholder="TYPE MESSAGE..." onkeypress="handleMessage(event)">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        function handleLogin(e) {
            if (e.key === 'Enter') {
                myUsername = document.getElementById('username-input').value;
                if(myUsername) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-chat').style.display = 'block';
                    socket.emit('join', myUsername);
                }
            }
        }

        function handleMessage(e) {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                socket.emit('chatMessage', msg);
                e.target.value = "";
            }
        }

        socket.on('message', (data) => {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            if(data.user === 'SYSTEM') {
                div.innerHTML = `<span class="system-msg">[LOG]: ${data.text}</span>`;
            } else {
                div.innerHTML = `<span class="user-name">${data.user}:</span> ${data.text}`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight; // Auto-scroll
        });
    </script>
</body>
</html>
