<!DOCTYPE html>
<html>
<head>
    <title>Local | Chats</title>
    <style>
        body { background: #0d0d0d; color: #00ff41; font-family: 'Courier New', monospace; margin: 20px; overflow: hidden; }
        #chat-container { border: 1px solid #00ff41; height: 75vh; overflow-y: scroll; padding: 10px; margin-bottom: 10px; position: relative; z-index: 2; }
        #login-screen { text-align: center; margin-top: 100px; }
        #main-chat { display: none; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px; width: 90%; outline: none; position: relative; z-index: 2; }
        .system-msg { color: #888; font-style: italic; }
        .user-name { font-weight: bold; color: #fff; }
        
        /* Screenshot Protection Watermark */
        #watermark {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none; opacity: 0.04;
            display: flex; flex-wrap: wrap; overflow: hidden; user-select: none;
            font-size: 14px; line-height: 20px;
        }
    </style>
</head>
<body>

    <div id="watermark"></div>

    <div id="login-screen">
        <h2>[ SYSTEM INITIALIZING ]</h2>
        <input type="text" id="username-input" placeholder="ENTER USERNAME..." onkeypress="handleLogin(event)">
    </div>

    <div id="main-chat">
        <div id="chat-container"></div>
        <input type="text" id="message-input" placeholder="TYPE MESSAGE..." onkeypress="handleMessage(event)">
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = "";

        function renderMessage(data) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            if(data.user === 'SYSTEM') {
                div.innerHTML = `<span class="system-msg">[LOG]: ${data.text}</span>`;
            } else {
                div.innerHTML = `<span class="user-name">${data.user}:</span> ${data.text}`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function handleLogin(e) {
            if (e.key === 'Enter') {
                const inputName = document.getElementById('username-input').value.trim();
                if(inputName) {
                    myUsername = inputName;
                    
                    // Set up the Watermark
                    document.getElementById('watermark').innerHTML = new Array(1000).fill(myUsername).join(' ');

                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-chat').style.display = 'block';
                    socket.emit('join', myUsername);
                }
            }
        }

        function handleMessage(e) {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if(msg.trim()) {
                    socket.emit('chatMessage', msg);
                    e.target.value = "";
                }
            }
        }

        socket.on('message', (data) => renderMessage(data));

        socket.on('load history', (history) => {
            history.forEach(data => renderMessage(data));
        });
    </script>
</body>
</html>
